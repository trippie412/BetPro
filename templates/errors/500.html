{% extends "layouts/base.html" %}
{% block title %}Server Error - BetPro{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="text-center">
        <div class="display-1 fw-bold text-warning mb-3">500</div>
        <h3 class="fw-bold mb-2">Server Error</h3>
        <p class="text-muted mb-4">Something went wrong on our end. Please try again later.</p>
        <a href="{{ url_for('dashboard.index') if current_user.is_authenticated else url_for('auth.login') }}" class="btn btn-gold px-4 fw-bold">
            <i class="fas fa-home me-2"></i> Go Home
        </a>
    </div>
</div>
{% endblock %}
