{% extends "layouts/base.html" %}
{% block title %}Too Many Requests - BetPro{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="text-center">
        <div class="display-1 fw-bold text-info mb-3">429</div>
        <h3 class="fw-bold mb-2">Too Many Requests</h3>
        <p class="text-muted mb-4">You've sent too many requests. Please wait a moment before trying again.</p>
        <a href="{{ url_for('dashboard.index') if current_user.is_authenticated else url_for('auth.login') }}" class="btn btn-gold px-4 fw-bold">
            <i class="fas fa-home me-2"></i> Go Home
        </a>
    </div>
</div>
{% endblock %}
