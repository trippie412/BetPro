{% extends "layouts/base.html" %}
{% block title %}Page Not Found - BetPro{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="text-center">
        <div class="display-1 fw-bold text-gold mb-3">404</div>
        <h3 class="fw-bold mb-2">Page Not Found</h3>
        <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
        <a href="{{ url_for('dashboard.index') if current_user.is_authenticated else url_for('auth.login') }}" class="btn btn-gold px-4 fw-bold">
            <i class="fas fa-home me-2"></i> Go Home
        </a>
    </div>
</div>
{% endblock %}
