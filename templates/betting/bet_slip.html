<!-- Bet Slip Component -->
<div id="betslipPanelInline" class="betslip-panel">
    <div class="betslip-header">
        <h6 class="fw-bold mb-0">
            <i class="fas fa-receipt text-gold me-1"></i>Bet Slip
            <span class="badge bg-warning text-dark ms-1" id="betslipCount">0</span>
        </h6>
    </div>

    <div class="betslip-body" id="betslipSelectionsArea" style="display: none;">
        <div id="betslipSelections"></div>
    </div>

    <div id="betslipEmpty" class="text-center p-4">
        <i class="fas fa-plus-circle fa-2x text-muted mb-2"></i>
        <p class="text-muted small mb-0">Your bet slip is empty</p>
        <p class="text-muted" style="font-size: 11px;">Click on odds to add selections</p>
    </div>

    <div id="betslipFooter" class="betslip-footer" style="display: none;">
        <div class="d-flex justify-content-between mb-2">
            <span class="text-muted small">Type:</span>
            <span class="fw-bold small" id="betslipType">Single</span>
        </div>
        <div class="d-flex justify-content-between mb-2">
            <span class="text-muted small">Selections:</span>
            <span class="fw-bold small" id="betslipCount2">0</span>
        </div>
        <div class="d-flex justify-content-between mb-2">
            <span class="text-muted small">Total Odds:</span>
            <span class="text-gold fw-bold" id="betslipTotalOdds">0.00</span>
        </div>
        <div class="mb-3">
            <label class="form-label text-muted small">Stake (KES)</label>
            <input type="number" class="form-control form-control-dark" id="betslipStake" placeholder="Enter stake amount" min="10" step="10" />
        </div>
        <div class="d-flex justify-content-between mb-2">
            <span class="text-muted small">Potential Win:</span>
            <span class="fw-bold text-success" id="betslipPotential">0.00</span>
        </div>
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="betslipUseBonus" />
            <label class="form-check-label text-muted small">Use Bonus Balance</label>
        </div>
        <button class="btn btn-gold w-100 fw-bold" id="betslipPlaceBtn" onclick="placeBet()">
            <i class="fas fa-check me-1"></i> Place Bet
        </button>
        <button class="btn btn-link text-muted btn-sm w-100 mt-1" id="betslipClear" onclick="clearBetSlip()">
            <i class="fas fa-trash me-1"></i> Clear All
        </button>
    </div>
</div>
